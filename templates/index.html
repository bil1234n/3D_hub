<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxé | Professional AR</title>
    
    <!-- 1. LOAD THE LATEST MODEL VIEWER (Google's Engine) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <!-- 2. FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #c5a059; 
            --dark: #111; 
            --glass: rgba(255, 255, 255, 0.95); 
            --shadow: 0 20px 40px rgba(0,0,0,0.08); 
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #fff; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 320px; background: white; border-right: 1px solid #f0f0f0; 
            display: flex; flex-direction: column; z-index: 100; position: relative; 
        }
        
        .sidebar-header { 
            padding: 35px; letter-spacing: 4px; font-weight: 600; font-size: 1.2rem; 
            text-align: center; border-bottom: 1px solid #f5f5f5; color: var(--dark);
        }

        .product-list { flex: 1; overflow-y: auto; padding: 20px; }
        .product-list::-webkit-scrollbar { width: 4px; }
        .product-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        .item-card { 
            padding: 18px; margin-bottom: 12px; cursor: pointer; border-radius: 12px;
            background: #fafafa; border: 1px solid transparent; 
        }
        .item-card:hover { background: #f0f0f0; }
        .item-card.active { 
            background: #fff; border-color: var(--accent); box-shadow: var(--shadow); 
            transform: scale(1.02);
        }
        .item-cat { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; display:block; margin-bottom: 4px;}
        .item-name { font-weight: 600; font-size: 0.9rem; color: var(--dark); }

        /* --- MAIN STAGE --- */
        .main-stage { flex: 1; position: relative; background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f4f4f4 100%); }

        /* --- ADVANCED MODEL VIEWER CONFIG --- */
        model-viewer { 
            width: 100%; height: 100%; outline: none;
            --poster-color: transparent;
        }

        /* Loading Bar (The Professional Touch) */
        .progress-bar {
            display: block; width: 33%; height: 4px; position: absolute; 
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            border-radius: 2px; background-color: rgba(0, 0, 0, 0.1); overflow: hidden;
        }
        .update-bar {
            background-color: var(--accent); width: 0%; height: 100%; 
            float: left; transition: width 0.3s;
        }
        .hide { display: none; }

        /* AR Interaction Prompt (Hand Icon) */
        #ar-prompt {
            position: absolute; left: 50%; bottom: 180px; transform: translateX(-50%);
            display: none; width: 60px; pointer-events: none; animation: wiggle 2s infinite;
        }
        @keyframes wiggle { 0%, 100% { transform: translateX(-50%) rotate(0deg); } 25% { transform: translateX(-50%) rotate(-10deg); } 75% { transform: translateX(-50%) rotate(10deg); } }

        /* Hotspots (Clickable Dots) */
        .hotspot {
            display: block; width: 20px; height: 20px; border-radius: 50%; border: none;
            background-color: var(--accent); box-shadow: 0 0 0 4px rgba(255,255,255,0.5);
            position: relative; cursor: pointer; transition: transform 0.2s;
        }
        .hotspot:hover { transform: scale(1.2); }
        .hotspot-annotation {
            background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: #333; font-size: 12px; font-weight: 600; padding: 8px 12px;
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            opacity: 0; pointer-events: none; transition: opacity 0.3s; width: max-content;
        }
        .hotspot:hover .hotspot-annotation { opacity: 1; }

        /* Glass Info Panel */
        .glass-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 480px; background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow); z-index: 20; text-align: center;
        }

        .price-tag { font-size: 1.5rem; font-weight: 300; color: var(--dark); margin: 5px 0 15px 0; }
        
        .ar-btn { 
            width: 100%; background: var(--dark); color: white; border: none; padding: 18px;
            border-radius: 12px; font-weight: 600; font-size: 0.9rem; cursor: pointer; 
            letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .ar-btn:hover { background: #000; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }

        /* Desktop QR Modal */
        #qr-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; 
            backdrop-filter: blur(8px);
        }
        .qr-card { background: white; padding: 40px; border-radius: 24px; text-align: center; max-width: 350px; }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); transition: transform 0.4s; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block !important; }
        }
        .menu-toggle { 
            display: none; position: absolute; top: 20px; left: 20px; z-index: 101;
            background: white; border: none; padding: 10px; border-radius: 50%; box-shadow: var(--shadow); 
        }
    </style>
</head>
<body>

<!-- Mobile Menu Button -->
<button class="menu-toggle" onclick="toggleSidebar()">
    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#000" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">LUXÉ AR</div>
    <div class="product-list" id="ui-list"></div>
</div>

<div class="main-stage">
    
    <!-- 
        ADVANCED MODEL VIEWER 
        1. ar-placement="floor": Fixes the "jumping" issue.
        2. ar-scale="auto": Fixes the "cannot resize" issue.
        3. touch-action="pan-y": Fixes the "scrolling while rotating" issue.
    -->
    <model-viewer id="viewer" 
        camera-controls 
        touch-action="pan-y" 
        disable-pan
        auto-rotate 
        shadow-intensity="1.5" 
        shadow-softness="0.8"
        environment-image="neutral" 
        exposure="1"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="auto" 
        ar-placement="floor"
        interaction-prompt="auto">

        <!-- Custom AR Button (Hidden, triggered by JS) -->
        <button slot="ar-button" style="display:none;" id="native-ar-btn"></button>

        <!-- Professional Loading Bar -->
        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

        <!-- AR Prompt (Hand Icon) -->
        <div id="ar-prompt" slot="ar-prompt">
            <img src="https://modelviewer.dev/shared-assets/icons/hand.png" style="width: 100%;">
        </div>

        <!-- Example Hotspot (You can add these dynamically) -->
        <button class="hotspot" slot="hotspot-1" data-position="0 0.5 0" data-normal="0 0 1">
            <div class="hotspot-annotation">360° Detail</div>
        </button>

    </model-viewer>

    <div class="glass-panel">
        <h2 id="p-title" style="margin:0; font-weight: 600;">Loading...</h2>
        <div class="price-tag" id="p-price">$0.00</div>
        <p id="p-desc" style="color: #555; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px;">Select an item.</p>
        
        <button class="ar-btn" onclick="triggerAR()">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M5 2c-1.65 0-3 1.35-3 3v4h2v-4c0-.55.45-1 1-1h4v-2h-4zm0 15v4c0 .55.45 1 1 1h4v2h-4c-1.65 0-3-1.35-3-3v-4h2zm14-15h-4v2h4c.55 0 1 .45 1 1v4h2v-4c0-1.65-1.35-3-3-3zm0 15c0 .55-.45 1-1 1h-4v2h4c1.65 0 3-1.35 3-3v-4h-2v4zM12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3 3 3z"/></svg>
            VIEW IN MY SPACE
        </button>
    </div>
</div>

<!-- QR Modal -->
<div id="qr-modal">
    <div class="qr-card">
        <h3>Augmented Reality</h3>
        <p style="color:#666; font-size:0.9rem;">Scan to view in your room.</p>
        <img id="qr-image" src="" style="width:200px; height:200px; border-radius:8px; margin: 20px 0;">
        <button onclick="closeQR()" style="background:transparent; border:1px solid #ccc; padding:10px 30px; border-radius:20px; cursor:pointer;">Close</button>
    </div>
</div>

<script>
    // 1. DATA FROM DJANGO
    const inventory = [
        {% for p in products %}
        {
            id: "{{ p.id }}",
            name: "{{ p.name }}",
            category: "{{ p.category }}", 
            price: "{{ p.price }}",
            desc: "{{ p.description|escapejs }}",
            // Android/Web file
            src: "{{ p.model_3d.url }}".replace('http://', 'https://'), 
            // iOS file (Must be USDZ for AR to work on iPhone)
            ios: "{% if p.usdz_model %}{{ p.usdz_model.url|escapejs }}{% endif %}" 
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];

    const viewer = document.getElementById('viewer');
    const list = document.getElementById('ui-list');
    let currentItem = null;

    // 2. INITIALIZATION
    function init() {
        if(inventory.length === 0) return;

        list.innerHTML = inventory.map(p => `
            <div class="item-card" id="card-${p.id}" onclick="loadItem('${p.id}')">
                <span class="item-cat">${p.category}</span>
                <span class="item-name">${p.name}</span>
            </div>
        `).join('');

        loadItem(inventory[0].id);
    }

    // 3. LOAD ITEM LOGIC
    function loadItem(id) {
        currentItem = inventory.find(p => p.id === id);
        
        // Update UI
        document.getElementById('p-title').innerText = currentItem.name;
        document.getElementById('p-price').innerText = `$${currentItem.price}`;
        document.getElementById('p-desc').innerText = currentItem.desc;

        // Highlight Sidebar
        document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${id}`).classList.add('active');

        // Update 3D Model
        viewer.src = currentItem.src;
        if(currentItem.ios) {
            viewer.setAttribute('ios-src', currentItem.ios);
        } else {
            viewer.removeAttribute('ios-src');
        }
        
        // Reset Camera
        viewer.dismissPoster();
    }

    // 4. ADVANCED AR TRIGGER
    function triggerAR() {
        // Check if device supports AR natively
        const canAR = viewer.canActivateAR;

        if (canAR) {
            // Trigger the hidden native button
            // This is the most stable way to launch AR on both iOS and Android
            viewer.activateAR();
        } else {
            // Fallback to QR Code for Desktop
            const qrModal = document.getElementById('qr-modal');
            const qrImg = document.getElementById('qr-image');
            const url = window.location.href; 
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}`;
            qrModal.style.display = 'flex';
        }
    }

    // 5. LOADING BAR LOGIC
    viewer.addEventListener('progress', (e) => {
        const bar = document.querySelector('.update-bar');
        const container = document.querySelector('.progress-bar');
        const percentage = e.detail.totalProgress * 100;
        
        bar.style.width = `${percentage}%`;
        
        if (percentage === 100) {
            setTimeout(() => container.classList.add('hide'), 500);
        } else {
            container.classList.remove('hide');
        }
    });

    // Mobile Toggle
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }
    function closeQR() {
        document.getElementById('qr-modal').style.display = 'none';
    }

    init();
</script>

</body>
</html>
