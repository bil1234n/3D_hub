<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxé | Ultimate Immersive Experience</title>
    <!-- Model Viewer Component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c5a059; --dark: #111; --glass: rgba(255, 255, 255, 0.88); --shadow: 0 20px 40px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #fff; }

        /* --- Enhanced Sidebar Architecture --- */
        .sidebar { 
            width: 360px; /* Slightly wider for a premium layout */
            background: #ffffff; 
            border-right: 1px solid #eaeaea; 
            display: flex; 
            flex-direction: column; 
            z-index: 200; /* Increased to ensure it overlays controls on mobile */
            position: relative; 
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.02); /* Soft, professional depth */
            flex-shrink: 0;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), margin 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Desktop hiding mechanism */
        .sidebar.hidden { 
            transform: translateX(-100%); 
            margin-right: -360px; 
        }

        .sidebar-header { 
            padding: 40px 30px 20px 30px; 
            letter-spacing: 6px; 
            font-weight: 400; /* Slightly bolder for better readability */
            font-size: 1.2rem; 
            text-align: center; 
            color: var(--dark);
        }
        
        .category-nav { 
            display: flex; 
            gap: 12px; 
            padding: 0 20px 15px 20px; 
            overflow-x: auto; 
            white-space: nowrap; 
            scrollbar-width: none; 
            border-bottom: 1px solid #f5f5f5; /* Separator for structure */
        }
        .category-nav::-webkit-scrollbar { display: none; }
        
        .cat-pill { 
            padding: 8px 16px; 
            border-radius: 8px; /* Modern, sharper corners */
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 600;
            cursor: pointer; 
            border: 1px solid transparent; 
            color: #888; 
            background: #f8f8f8; 
            transition: all 0.3s ease;
        }
        .cat-pill:hover { background: #eee; color: var(--dark); }
        .cat-pill.active { background: var(--dark); color: white; }

        /* Elegant Scrollbars */
        .product-list { flex: 1; overflow-y: auto; padding: 20px; }
        .product-list::-webkit-scrollbar { width: 5px; }
        .product-list::-webkit-scrollbar-track { background: transparent; }
        .product-list::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }
        .product-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Premium Item Cards */
        .item-card { 
            padding: 18px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #f0f0f0; 
            background: #ffffff; 
            transition: all 0.3s ease;
        }
        .item-card:hover {
            border-color: #e4e4e4;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
        }
        .item-card.active { 
            background: #fff; 
            border-color: var(--accent); 
            box-shadow: 0 8px 20px rgba(197, 160, 89, 0.12); /* Accent-tinted shadow */
        }

        .view-selector { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #eee; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            outline: none; 
            background: #fafafa; 
            cursor: pointer; 
            font-weight: 600;
            color: #555;
            transition: border-color 0.3s;
        }
        .view-selector:hover { border-color: #ccc; }

        /* --- Mobile Responsiveness --- */
        /* --- Responsive Behavior for 800px and below --- */
        @media (max-width: 800px) {
            /* Hide sidebar by default on mobile/tablet */
            .sidebar {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                width: 300px;
                transform: translateX(-100%); /* Start Hidden */
                margin-right: 0;
                box-shadow: 10px 0 30px rgba(0,0,0,0.2);
                z-index: 1000; /* Ensure it stays above the 3D viewer */
            }

            /* When the .hidden class is NOT present, it shows. 
            Note: We reverse the logic slightly for mobile if needed, 
            but keeping your toggle function consistent: */
            .sidebar.active-mobile {
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute; /* Overlays the 3D model instead of shrinking it */
                top: 0;
                left: 0;
                height: 100vh;
                width: 85%; 
                max-width: 340px;
                box-shadow: 20px 0 40px rgba(0,0,0,0.15); /* Stronger shadow to separate from background */
            }
            .sidebar.hidden {
                transform: translateX(-100%);
                margin-right: 0; /* Negate the desktop margin trick */
                box-shadow: none;
            }
        }

        /* Main Display Stage */
        .main-stage { flex: 1; position: relative; background: radial-gradient(circle at center, #ffffff 0%, #f2f2f2 100%); }
        model-viewer { width: 100%; height: 100%; outline: none; --poster-color: transparent; }

        /* Measurement Labels */
        .dim-label { background: #fff; border: 1px solid #000; padding: 4px 10px; font-size: 10px; font-weight: 600; color: #000; pointer-events: none; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 5px; white-space: nowrap; opacity: 0; transform: translateY(10px); }
        model-viewer.show-dimensions .dim-label { opacity: 1; transform: translateY(0); }
        .dim-line { width: 1px; height: 15px; background: #000; position: absolute; top: 100%; left: 50%; }

        /* Image Gallery Overlays */
        #image-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: #fdfdfd; z-index: 5; }
        #image-overlay img { max-width: 80%; max-height: 80%; object-fit: contain; border-radius: 10px; }

        .gallery-nav { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; align-items: center; background: white; padding: 10px 25px; border-radius: 40px; box-shadow: var(--shadow); z-index: 10; }
        .nav-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--dark); font-weight: bold; }

        /* Controls */
        .control-dock { position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .icon-btn { width: 54px; height: 54px; background: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow); color: var(--dark); }
        .icon-btn:hover, .icon-btn.active { background: var(--dark); color: white; transform: scale(1.1); }

        /* Info Panel */
        .glass-panel { position: absolute; bottom: 30px; left: 50%; transform: translate(-50%, 150%); width: 90%; max-width: 500px; background: var(--glass); backdrop-filter: blur(25px); padding: 30px 40px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.4); box-shadow: var(--shadow); z-index: 20; opacity: 0; }
        .glass-panel.show { transform: translate(-50%, 0); opacity: 1; }

        .price { font-size: 1.8rem; font-weight: 200; margin: 10px 0; }
        
        /* New Professional Variant Pills */
        .variant-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-top: 15px; display: block; }
        .swatch-container { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
        .variant-pill { 
            padding: 8px 16px; border-radius: 30px; background: white; border: 1px solid #ddd; 
            font-size: 11px; cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .variant-pill:hover { border-color: var(--accent); }
        .variant-pill.active { background: var(--dark); color: white; border-color: var(--dark); }

        .ar-btn { width: 100%; background: var(--dark); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        #loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 500; }
        #loader-overlay.hidden { opacity: 0; visibility: hidden; }
        #loader-bar-fill { position: absolute; height: 100%; width: 0%; background: var(--accent); }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">LUXÉ</div>
    <div class="category-nav" id="category-nav">
        <div class="cat-pill active" onclick="filterByCategory('All', this)">All</div>
    </div>
    <div class="product-list" id="ui-list"></div>
</div>

<div class="main-stage">
    <div class="control-dock">
        <button class="icon-btn" onclick="toggleDimensions(this)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9h20M2 15h20M2 9v6M22 9v6M7 9v3M12 9v3M17 9v3"/></svg></button>
        <button class="icon-btn" onclick="toggleSidebar()"><svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
        <button class="icon-btn" onclick="toggleInfo()"><svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></button>
    </div>

    <div id="loader-overlay">
        <div class="loader-content" style="text-align:center;">
            <div style="font-size: 3rem; font-weight: 200;"><span id="load-percentage">0</span>%</div>
            <div style="width: 200px; height: 2px; background: #eee; position: relative;"><div id="loader-bar-fill"></div></div>
        </div>
    </div>

    <model-viewer id="viewer" camera-controls auto-rotate shadow-intensity="1.8" environment-image="neutral" exposure="1.1" ar ar-modes="webxr scene-viewer quick-look">
        <div slot="hotspot-dim-width" class="dim-label">W: <span id="v-width">--</span><div class="dim-line"></div></div>
        <div slot="hotspot-dim-height" class="dim-label">H: <span id="v-height">--</span><div class="dim-line" style="transform:rotate(90deg); left:100%; top:50%;"></div></div>
        <div slot="hotspot-dim-depth" class="dim-label">D: <span id="v-depth">--</span></div>
    </model-viewer>

    <div id="image-overlay">
        <img id="static-img" src="">
        <div class="gallery-nav" id="gallery-controls">
            <button class="nav-btn" onclick="changeImage(-1)">‹</button>
            <span id="gallery-counter" style="font-size: 12px; font-weight: 600;">1 / 1</span>
            <button class="nav-btn" onclick="changeImage(1)">›</button>
        </div>
    </div>

    <div class="glass-panel" id="info-panel">
        <span id="p-cat" style="text-transform: uppercase; font-size: 11px; letter-spacing: 4px; color: var(--accent); font-weight: 600;"></span>
        <h2 id="p-title" style="margin:10px 0 0 0; font-weight: 400; font-size: 1.8rem;"></h2>
        <div class="price" id="p-price"></div>
        
        <span class="variant-tag">Color & Type Options</span>
        <div class="swatch-container" id="swatch-container"></div>
        
        <p id="p-desc" style="color: #444; font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px;"></p>
        <button class="ar-btn" onclick="viewer.activateAR()">OPEN IN AR</button>
    </div>
</div>

<script>
    const CLOUDINARY_BASE = "http://res.cloudinary.com/duhidqjmj";

    const inventory = [
        {% for p in products %}
        {
            id: "{{ p.id }}",
            name: "{{ p.name }}",
            category: "{{ p.category }}", 
            price: "{{ p.price }}",
            desc: "{{ p.description|escapejs }}",
            variants: [
                {% for v in p.variants.all %}
                { name: "{{ v.variant_name|escapejs }}", file: "{{ v.get_model_url|escapejs }}" },
                {% endfor %}
            ],
            // Fix: Check if URL is absolute, otherwise prepend base
            images: [
                "{{ p.main_image.url }}".startsWith('http') ? "{{ p.main_image.url }}" : CLOUDINARY_BASE + "{{ p.main_image.url }}",
                {% for extra in p.gallery.all %}
                "{{ extra.image.url }}".startsWith('http') ? "{{ extra.image.url }}" : CLOUDINARY_BASE + "{{ extra.image.url }}",
                {% endfor %}
            ],
            currentImgIndex: 0
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];

    let activeItemID = null;
    const viewer = document.getElementById('viewer');

    function init() {
        renderCategoryFilters();
        renderProductList('All');

        // 1. Get ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productID = urlParams.get('product');

        if (productID) {
            // 2. Find item (Convert both to String to be safe)
            const targetItem = inventory.find(p => String(p.id) === String(productID));
            
            if (targetItem) {
                selectItem(targetItem.id);
                
                // 3. Wait a tiny bit for the HTML to finish rendering before scrolling
                setTimeout(() => {
                    const card = document.getElementById(`card-${targetItem.id}`);
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 100);
            } else {
                if (inventory.length > 0) selectItem(inventory[0].id);
            }
        } else {
            if (inventory.length > 0) selectItem(inventory[0].id);
        }
    }

    function selectItem(id) {
        // Convert ID to string to ensure matching works
        const item = inventory.find(p => String(p.id) === String(id));
        if (!item) return; // Exit if item not found to prevent crash

        activeItemID = String(id);
        
        // Reset View Mode to 3D
        updateViewMode(id, '3d');

        // Update Text Content safely
        document.getElementById('p-title').innerText = item.name;
        document.getElementById('p-price').innerText = `$${item.price}`;
        document.getElementById('p-desc').innerText = item.desc;
        document.getElementById('p-cat').innerText = item.category;

        // Render Variants
        const container = document.getElementById('swatch-container');
        if (item.variants && item.variants.length > 0) {
            container.innerHTML = item.variants.map((v, index) => `
                <div class="variant-pill ${index === 0 ? 'active' : ''}" 
                    onclick="switchVariant('${v.file}', this)">
                    ${v.name}
                </div>
            `).join('');
            
            // Load the first variant file
            switchVariant(item.variants[0].file, container.querySelector('.variant-pill'));
        } else {
            container.innerHTML = '<span class="text-muted small">No 3D configurations</span>';
        }

        // Update Sidebar Active State
        document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById(`card-${id}`);
        if (activeCard) activeCard.classList.add('active');
    }

    function renderCategoryFilters() {
        const nav = document.getElementById('category-nav');
        const categories = [...new Set(inventory.map(p => p.category))];
        categories.forEach(cat => {
            const pill = document.createElement('div');
            pill.className = 'cat-pill';
            pill.innerText = cat;
            pill.onclick = (e) => filterByCategory(cat, e.target);
            nav.appendChild(pill);
        });
    }

    function filterByCategory(category, element) {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        element.classList.add('active');
        renderProductList(category);
    }

    function renderProductList(category) {
        const list = document.getElementById('ui-list');
        const filtered = category === 'All' ? inventory : inventory.filter(p => p.category === category);
        list.innerHTML = filtered.map((p) => `
            <div class="item-card ${activeItemID === p.id ? 'active' : ''}" id="card-${p.id}" onclick="selectItem('${p.id}')">
                <span style="font-size: 9px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight:600;">${p.category}</span>
                <span style="font-weight: 600; font-size: 0.95rem;">${p.name}</span>
                <select class="view-selector" onclick="event.stopPropagation()" onchange="updateViewMode('${p.id}', this.value)">
                    <option value="3d">Digital Twin (3D)</option>
                    <option value="image">Photography</option>
                </select>
            </div>
        `).join('');
    }

   function switchVariant(fileUrl, element) {
        // Update UI Pills
        document.querySelectorAll('.variant-pill').forEach(p => p.classList.remove('active'));
        element.classList.add('active');

        // Swap the actual .glb file in the viewer
        document.getElementById('loader-overlay').classList.remove('hidden');
        viewer.src = fileUrl;
    }

    function updateViewMode(id, mode) {
        const item = inventory.find(p => p.id === id);
        const overlay = document.getElementById('image-overlay');
        
        if (mode === 'image') {
            overlay.style.display = 'flex';
            document.getElementById('static-img').src = item.images[item.currentImgIndex];
        } else {
            overlay.style.display = 'none';
        }
    }

    function changeImage(dir) {
        const item = inventory.find(p => p.id === activeItemID);
        item.currentImgIndex = (item.currentImgIndex + dir + item.images.length) % item.images.length;
        document.getElementById('static-img').src = item.images[item.currentImgIndex];
        updateGalleryUI(item);
    }

    function updateGalleryUI(item) {
        document.getElementById('gallery-counter').innerText = `${item.currentImgIndex + 1} / ${item.images.length}`;
    }

    // --- Viewer Listeners ---

    viewer.addEventListener('progress', (e) => {
        const p = Math.round(e.detail.totalProgress * 100);
        document.getElementById('load-percentage').innerText = p;
        document.getElementById('loader-bar-fill').style.width = p + '%';
        if(p === 100) setTimeout(() => document.getElementById('loader-overlay').classList.add('hidden'), 600);
    });

    viewer.addEventListener('load', () => {
        // Recalculate dimensions whenever a new variant is loaded
        const center = viewer.getBoundingBoxCenter();
        const size = viewer.getDimensions();
        
        document.getElementById('v-width').innerText = (size.x * 100).toFixed(1) + 'cm';
        document.getElementById('v-height').innerText = (size.y * 100).toFixed(1) + 'cm';
        document.getElementById('v-depth').innerText = (size.z * 100).toFixed(1) + 'cm';

        viewer.updateHotspot({ name: 'hotspot-dim-width', position: `${center.x} ${center.y - size.y/2} ${center.z + size.z/2}` });
        viewer.updateHotspot({ name: 'hotspot-dim-height', position: `${center.x + size.x/2} ${center.y} ${center.z + size.z/2}` });
        viewer.updateHotspot({ name: 'hotspot-dim-depth', position: `${center.x + size.x/2} ${center.y - size.y/2} ${center.z}` });
    });

    function toggleDimensions(btn) { viewer.classList.toggle('show-dimensions'); btn.classList.toggle('active'); }
    function toggleInfo() { document.getElementById('info-panel').classList.toggle('show'); }
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const isMobile = window.innerWidth <= 800;

        if (isMobile) {
            // On mobile, we use a specific class to slide it in over the content
            sidebar.classList.toggle('active-mobile');
            // Ensure the desktop 'hidden' class doesn't interfere
            sidebar.classList.remove('hidden'); 
        } else {
            // On desktop, use your original sliding/margin logic
            sidebar.classList.toggle('hidden');
            sidebar.classList.remove('active-mobile');
        }
    }

    // Optional: Auto-hide sidebar when a product is selected on mobile
    const originalSelectItem = selectItem;
    selectItem = function(id) {
        originalSelectItem(id); // Run original logic
        if (window.innerWidth <= 800) {
            document.getElementById('sidebar').classList.remove('active-mobile');
        }
    };

    init();
</script>
</body>
</html>
